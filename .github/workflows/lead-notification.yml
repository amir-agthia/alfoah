name: Lead notification

on:
  repository_dispatch:
    types: [lead-submission]

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - name: Send lead email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "New catalog request — ${{ github.event.client_payload.name }}"
          to: amir.wagih@agthia.com
          from: Al Foah Catalog <${{ secrets.GMAIL_USERNAME }}>
          body: |
            New catalog download request:

            Name:    ${{ github.event.client_payload.name }}
            Email:   ${{ github.event.client_payload.email }}
            Company: ${{ github.event.client_payload.company }}
            Mobile:  ${{ github.event.client_payload.mobile }}

            Submitted at: ${{ github.event.client_payload.submittedAt }}
